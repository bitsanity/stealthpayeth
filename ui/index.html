<script type="text/javascript">
  const EC = require('elliptic').ec
  const ec = new EC('secp256k1')
  const sha3 = require( 'js-sha3' )
  const ecc = require( '@bitcoinerlab/secp256k1' )

  const SCANURL = '/cgi-bin/epkscan'
  const BALCURL = '/cgi-bin/balances'
  const CGIPOSTTEMPLATE = {
    method: "POST",
    mode: "cors",
    cache: "no-cache",
    credentials: "same-origin",
    headers: { "Content-Type": "application/json" },
    redirect: "follow",
    referrerPolicy: "no-referrer",
    body: ""
  }

  LABELS.setLabels()
  SKINS.setSkin( "plain" )

  $("#PrepareToReceiveDialog").hide()
  $("#PrepareToSendDialog").hide()
  $("#ScanForIncomingDialog").hide()
  $("#EphKeyRegistryField").val( "0xadd556918186b073eb51fea466e742f53f3defe5" )

  function hexToBytes(hex) {
    let bytes = [];
    for (let c = 0; c < hex.length; c += 2)
      bytes.push(parseInt(hex.substr(c, 2), 16));
    return bytes;
  }

  function bytesToHex(bytes) {
    let hex = [];
    for (let i = 0; i < bytes.length; i++) {
      let current = bytes[i] < 0 ? bytes[i] + 256 : bytes[i];
      hex.push((current >>> 4).toString(16));
      hex.push((current & 0xF).toString(16));
    }
    return hex.join("");
  }

  function pubkeyToAddress( pubkey ) {
    // omit leading 04 on purpose
    let keyhex = pubkey.getX().toString('hex') +
                 pubkey.getY().toString('hex')

    let keybytes = hexToBytes( keyhex )
    let hash = sha3.keccak256( keybytes )
    return hash.substring(24) // last twenty bytes two chars per byte
  }

  async function checkEPKs( epkarr ) {
    let srrskf = $("#ScanRxRootSpendKeyField").val()
    let m = hexToBytes( srrskf )
    let rootSpendKP = ec.keyFromPrivate( m )

    let tableStr = "<table>" +
      "<tr><th class=smalltxt>Address</th>" +
      "<th class=smalltxt>Balance (wei)</th>" +
      "<th class=smalltxt>Private Key</th></tr>"

    for (let ii = 0; ii < epkarr.length; ii++) {
      // S = m * R
      let R_pt = ec.keyFromPublic( epkarr[ii].replace('0x',''), 'hex' )
      let rhs = rootSpendKP.derive( R_pt.getPublic() ).toString( 16 )
      let Sx32 = hexToBytes( rhs )

      // p = m + hash(S)
      let hashS = sha3.keccak256( Sx32 )
      let p = ecc.privateAdd(
        Uint8Array.from(m),
        Uint8Array.from( hexToBytes(hashS) )
      )

      let pkey = ec.keyFromPrivate( p )
      let A = pubkeyToAddress( pkey.getPublic() )

      let post = JSON.parse( JSON.stringify(CGIPOSTTEMPLATE) ) // clone template
      post.body = JSON.stringify( [A] )

      let response = await fetch( BALCURL, post )
      let balresp = await response.json()
      if (    balresp
           && balresp.result
           && BigInt(balresp.result[0].balance) > 0n ) {

        tableStr +='<tr>' +
          '<td class=smalltxt>' + balresp.result[0].address + '</td>' +
          '<td class=smalltxt>' + balresp.result[0].balance + '</td>' +
          '<td class="hiddentxt smalltxt">' + bytesToHex(p) + '</td></tr>'
      }
    }

    tableStr += "</table>"
    $( "#ScanResults" ).append( tableStr )
  }

  async function doScan( timestamp ) {
    $( "#ScanResults" ).empty()
    $("#ScanButton").attr( 'hidden', true )

    let post = JSON.parse( JSON.stringify(CGIPOSTTEMPLATE) ) // clone template
    post.body = JSON.stringify( { starttimestamp: timestamp } )
    let response = await fetch( SCANURL, post )
    let epkresp = await response.json()

    $("#ScanButton").removeAttr( 'hidden' ) // better than setting to false

    if (epkresp && epkresp.result) {
      if (epkresp.result.length == 0)
        $("#ScanResults").append(
          "<table width=100%><tr><td align=center>none</th></tr></table>" )
      else
        checkEPKs( epkresp.result )
    }
  }

  PubSub.subscribe( 'AmReceiver', () => {
    $("#ModeSelectDialog").hide()

    $("#StealthKeyField").val( "" )
    $("#StealthAddressField").val( "" )
    $( "#RxStealthAddrQR" ).empty()

    $("#PrepareToReceiveDialog").show()
  } )

  PubSub.subscribe( 'AmSender', () => {
    $("#ModeSelectDialog").hide()
    $("#PrepareToSendDialog").show()

    $( "#RxStealthMetaAddressField" ).val( "" )
    $( "#EphPublicKeyField" ).val( "" )
    $( "#AssetAddressField" ).val( "" )
    $( "#AssetAddressQR" ).empty()
  } )

  PubSub.subscribe( 'CheckIncoming', () => {
    $("#ModeSelectDialog").hide()
    $("#ScanForIncomingDialog").show()

    $("#ScanRxRootSpendKeyField").val("")
    PubSub.publish( 'ResetStartDate' )
    $("#ScanButton").removeAttr( 'hidden' )
    $( "#ScanResults" ).empty()
  } )

  PubSub.subscribe( 'BackFromReceive', () => {
    let keyval = $("#StealthKeyField").val()

    if (keyval && keyval.length > 0) {
      if (!confirm(STRINGS[LANG].RxSaveStealthKeyWarning))
        return
    }

    $("#PrepareToReceiveDialog").hide()
    $("#ModeSelectDialog").show()
  } )

  PubSub.subscribe( 'BackFromScan', () => {
    $("#ScanForIncomingDialog").hide()
    $("#ModeSelectDialog").show()
  } )

  PubSub.subscribe( 'BackFromSend', () => {
    let rval = $( "#EphPublicKeyField" ).val()
    if (rval && rval.length > 0) {
      if (!confirm(STRINGS[LANG].SenderRWarning))
        return
    }

    $("#PrepareToSendDialog").hide()
    $("#ModeSelectDialog").show()
  } )

  PubSub.subscribe( 'GeneralInfoRequested', () => {
    alert( STRINGS[LANG].GeneralInfo )
  } )

  PubSub.subscribe( 'GeneralHelpRequested', () => {
    alert( STRINGS[LANG].GeneralHelp )
  } )

  PubSub.subscribe( 'GeneralSafetyRequested', () => {
    alert( STRINGS[LANG].GeneralSafety )
  } )

  PubSub.subscribe('GenerateSpendingKey', () => {
    var key = ec.genKeyPair()
    $("#StealthKeyField").val( key.getPrivate('hex') )

    let sma = key.getPublic( true, 'hex' )
    $("#StealthAddressField").val( sma )
    let qrcode = new QRCode( "RxStealthAddrQR", {
      text: sma,
      width: 400,
      height: 400,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    } );
  } )

  PubSub.subscribe( 'CopyReceiverStealthKey', () => {
    let txt = $( "#StealthKeyField" ).val()
    if (txt && txt.length > 0) {
      navigator.clipboard.writeText(txt)
      alert( STRINGS[LANG].CopiedOk )
    }
  } )

  PubSub.subscribe( 'CopyReceiverStealthAddress', () => {
    let txt = $( "#StealthAddressField" ).val()
    if (txt && txt.length > 0) {
      navigator.clipboard.writeText(txt)
      alert( STRINGS[LANG].CopiedOk )
    }
  } )

  PubSub.subscribe( 'GenerateEphemeralKey', () => {
    let M_hex = $( "#RxStealthMetaAddressField" ).val()

    if (!M_hex || !/0[23][0-9a-fA-F]{64}/.test(M_hex)) {
      alert( STRINGS[LANG].NeedRxStealthMetaAddr )
      return
    }

    // (r, R)
    let ephemeral = ec.genKeyPair()
    $( "#EphPublicKeyField" ).val( ephemeral.getPublic(true,'hex') )
    console.log( 'r: ' + ephemeral.getPrivate('hex') )

    let M_pt = ec.keyFromPublic( M_hex, 'hex' )

    // S = r * M
    let rhs = ephemeral.derive( M_pt.getPublic(false) )
    let Sx32 = hexToBytes( rhs.toString(16) )
    let hashS = sha3.keccak256( Sx32 )

    // P = M + G * hash(S)
    let hashpoint = ec.keyFromPrivate( hashS )
    let apub = M_pt.getPublic(true).add( hashpoint.getPublic(true) )

    let aaddr = '0x' + pubkeyToAddress( apub )
    $( "#AssetAddressField" ).val( aaddr )
    let qrcode = new QRCode( "AssetAddressQR", {
      text: aaddr,
      width: 400,
      height: 400,
      colorDark: "#000000",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    } )
  } )

  PubSub.subscribe( 'CopyEphemeralPubkey', () => {
    let txt = $( "#EphPublicKeyField" ).val()
    if (txt && txt.length > 0) {
      navigator.clipboard.writeText(txt)
      alert( STRINGS[LANG].CopiedOk )
    }
  } )

  PubSub.subscribe( 'CopyAssetAddress', () => {
    let txt = $( "#AssetAddressField" ).val()
    if (txt && txt.length > 0) {
      navigator.clipboard.writeText(txt)
      alert( STRINGS[LANG].CopiedOk )
    }
  } )

  PubSub.subscribe('ResetStartDate', () => {
    let dt = new Date()
    dt.setUTCMonth( dt.getUTCMonth() - 1 )

    let dd = '' + dt.getUTCDate()
    while (dd.length < 2) dd = '0' + dd
    let mm = '' + (dt.getUTCMonth() + 1)
    while (mm.length < 2) mm = '0' + mm
    let yyyy = '' + dt.getUTCFullYear()
    $( "#StartScanDD" ).val( dd )
    $( "#StartScanMM" ).val( mm )
    $( "#StartScanYYYY" ).val( yyyy )
  } )

  PubSub.subscribe('ScanForPayments', () => {
    let srrskf = $("#ScanRxRootSpendKeyField").val()
    if (!srrskf || srrskf.length != 64) {
      alert( STRINGS[LANG].InvalidRootSpendKey )
      return
    }

    let starttimestamp = new Date()
    starttimestamp.setUTCDate( parseInt($("#StartScanDD").val()) )
    starttimestamp.setUTCMonth( parseInt($("#StartScanMM").val()) )
    starttimestamp.setUTCFullYear( parseInt($("#StartScanYYYY").val()) )
    starttimestamp.setUTCHours( 0 )
    starttimestamp.setUTCMinutes( 0 )
    starttimestamp.setUTCSeconds( 0 )
    starttimestamp.setUTCMilliseconds( 0 )

    doScan( starttimestamp.getTime() )
  } )

</script>
